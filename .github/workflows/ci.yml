name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      # Align with local npm 11 lockfiles (Node 22 default npm can disagree with npm ci)
      - run: npm install -g npm@11
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://clement-daguenet.fr
          NEXT_PUBLIC_PRO_URL: https://clement-daguenet.fr
          NEXT_PUBLIC_GAMING_URL: https://woxayz.fr
          RESEND_API_KEY: ""
          ADMIN_PASSWORD: ci-admin
